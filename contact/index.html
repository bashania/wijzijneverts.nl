<style>
  html, body { margin: 0; background: var(--bg1); }
  body { font-family: var(--font-body); color: var(--fg2); }
  * { box-sizing: border-box; }
  a { color: var(--everts-green); }
  img { max-width: 100%; }
  .evt-show-sm { display: none; }

  @media (max-width: 900px) {
    .evt-nav-desktop, .evt-cta-desktop { display: none !important; }
    .evt-nav-burger { display: flex !important; }
    .evt-grid-4 { grid-template-columns: repeat(2, 1fr) !important; gap: 32px !important; }
    .evt-grid-3 { grid-template-columns: repeat(2, 1fr) !important; gap: 16px !important; }
    .evt-values, .evt-2col, .evt-detail { grid-template-columns: 1fr !important; gap: 40px !important; }
    .evt-detail aside { position: static !important; }
    .evt-dienst { grid-template-columns: 1fr !important; gap: 24px !important; }
    .evt-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
  }
  @media (max-width: 600px) {
    .evt-grid-4 { grid-template-columns: 1fr !important; }
    .evt-grid-3 { grid-template-columns: 1fr !important; }
    .evt-grid-2 { grid-template-columns: 1fr !important; }
    .evt-footer-grid { grid-template-columns: 1fr !important; }

<body>
<div id="root"></div>

<!-- Verborgen formulieren puur zodat Netlify Forms ze bij de build detecteert.
     De zichtbare formulieren worden door React gerenderd en posten via fetch naar deze namen. -->
<form name="contact" netlify-honeypot="bot-field" data-netlify="true" hidden>
  <input type="text" name="naam" />
  <input type="text" name="organisatie" />
  <input type="email" name="email" />
  <input type="text" name="onderwerp" />
  <input type="text" name="bot-field" />
</form>
<form name="sollicitatie" netlify-honeypot="bot-field" data-netlify="true" enctype="multipart/form-data" hidden>
  <input type="text" name="voornaam" />
  <input type="text" name="achternaam" />
  <input type="email" name="email" />
  <input type="tel" name="telefoon" />
  <input type="text" name="functie" />
  <input type="text" name="functie-titel" />
  <textarea name="motivatie"></textarea>
  <input type="file" name="cv" />
  <input type="text" name="bot-field" />
</form>
<script type="text/babel" src="js/Components.jsx"></script>
<script type="text/babel" src="js/Chrome.jsx"></script>
<script type="text/babel" src="js/Home.jsx"></script>
<script type="text/babel" src="js/Pages.jsx"></script>
<script type="text/babel" src="js/WatWeDoen.jsx"></script>
<script type="text/babel" src="js/Disciplines.jsx"></script>
<script type="text/babel" src="js/Vacatures.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;

  function App() {
    // Op de live site (statische deelpagina's) zet elke pagina zijn eigen route klaar
    // via window.__EVT_ROUTE__ en navigeren we met echte URL's (window.__EVT_STATIC__).
    const [route, setRoute] = useState(window.__EVT_ROUTE__ || { page: 'home', slug: null });
    const nav = (page, slug = null) => {
      if (window.__EVT_STATIC__) { window.location.href = EVT_URL(page, slug); return; }
      setRoute({ page, slug }); window.scrollTo({ top: 0 });
    };
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

    let view;
    switch (route.page) {
      case 'over': view = <Over />; break;
      case 'diensten': view = <Diensten onNav={nav} />; break;
      case 'discipline': view = <DisciplinePage slug={route.slug} onNav={nav} />; break;
      case 'werken': view = <Werken onNav={nav} />; break;
      case 'vacature': view = <VacatureDetail slug={route.slug} onNav={nav} />; break;
      case 'solliciteren': view = <Solliciteren slug={route.slug} onNav={nav} />; break;
      case 'contact': view = <Contact />; break;
      case 'privacy': view = <Privacy onNav={nav} />; break;
      default: view = <Home onNav={nav} />;
    }

    // top-nav highlight: vacancy/apply pages count as "werken"
    const current = ['vacature', 'solliciteren'].includes(route.page) ? 'werken'
      : route.page === 'discipline' ? 'diensten' : route.page;

    return (
      <React.Fragment>
        <Header current={current} onNav={nav} />
        {view}
        <Footer onNav={nav} />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
